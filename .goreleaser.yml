version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: bitb
    binary: bitb
    ldflags:
      - -s -w -X github.com/rafaelfnaves/bitb/cmd.version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: bitb
    name_template: "bitb-{{ .Version }}-{{ .Os }}-{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

changelog:
  disable: true

release:
  github:
    owner: rafaelfnaves
    name: bitb
  # release-please creates the release with CHANGELOG — GoReleaser only uploads binaries
  replace_existing_draft: true
